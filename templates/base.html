<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Smart Food Stall Pre-Order" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">Smart Food Pre-Order</a>

    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('menu') }}">Menu</a>

      {% if session.get("user_id") %}
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('cart_view') }}">Cart</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('my_orders') }}">My Orders</a>
        <a class="btn btn-warning btn-sm" href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a class="btn btn-success btn-sm" href="{{ url_for('login') }}">Login</a>
        <a class="btn btn-primary btn-sm" href="{{ url_for('register') }}">Register</a>
      {% endif %}

      <a class="btn btn-info btn-sm" href="{{ url_for('admin_dashboard') }}">Admin</a>
      <a class="btn btn-outline-info btn-sm" href="{{ url_for('admin_menu') }}">Admin Menu</a>
    </div>
  </div>
</nav>

<div class="container py-4">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-secondary card-soft">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
